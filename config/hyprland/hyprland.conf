# Monitor config - triple 1440p, 1.6x scaling
# Left (portrait) | Center (landscape, ASUS) | Right (portrait)
monitor = HDMI-A-1, 2560x1440, 0x0, 1.6, transform, 1
monitor = DP-2, 2560x1440, 900x0, 1.6
monitor = DP-1, 2560x1440, 2500x0, 1.6, transform, 1

# Autostart
exec-once = waybar
exec-once = mako
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# GTK/Qt theme (Catppuccin Mocha)
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'catppuccin-mocha-blue-standard+default'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'breeze-dark'

# Environment
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct

# Fractional scaling - render at native res, let apps handle scaling
xwayland {
    force_zero_scaling = true
}
env = GDK_SCALE,1.6
env = QT_SCALE_FACTOR,1.6

# Input
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

# Appearance
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(b0b0b066)
    col.inactive_border = rgba(45475a44)
    layout = dwindle

    snap {
        enabled = true
        window_gap = 10
        monitor_gap = 10
    }
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 5
        passes = 2
    }
    shadow {
        enabled = true
        range = 10
        render_power = 3
    }
}

animations {
    enabled = true
    animation = windows, 1, 4, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 4, default
}

# -----------------------------------------------------------
# FLOATING MODE: all windows float by default (KDE-like UX)
# -----------------------------------------------------------
windowrule = match:class .*, float on
windowrule = match:class .*, maximize on

# Title bars (hyprbars plugin - Catppuccin Mocha colors)
plugin {
    hyprbars {
        bar_height = 28
        bar_color = rgb(1e1e2e)
        col.text = rgb(cdd6f4)
        bar_text_size = 12
        bar_text_font = Sans
        bar_text_align = center
        bar_padding = 10
        bar_button_padding = 8
        bar_precedence_over_border = true
        bar_part_of_window = true
        on_double_click = hyprctl dispatch fullscreen 1

        # Close | Maximize | Minimize (right-aligned)
        hyprbars-button = rgb(f38ba8), 14, , hyprctl dispatch killactive
        hyprbars-button = rgb(a6e3a1), 14, , hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(fab387), 14, , hyprctl dispatch movetoworkspacesilent special:minimized
    }
}

# Key bindings
$mod = SUPER

bind = $mod, Return, exec, ghostty
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, E, exec, thunar
bind = $mod, Space, exec, rofi -show drun
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen

# Alt+Tab visual window switcher (hyprswitch)
exec-once = hyprswitch init --show-title --size-factor 6 --workspaces-per-row 5 &
$alttab_key = tab
$alttab_mod = alt
bind = $alttab_mod, $alttab_key, exec, hyprswitch gui --mod-key $alttab_mod --key $alttab_key

# Window snapping (Meta+Arrow: snap to half screen / maximize / move monitor)
bind = $mod, left, exec, ~/.local/bin/hyprfloat snap 0 0.5 0 1
bind = $mod, right, exec, ~/.local/bin/hyprfloat snap 0.5 1 0 1
bind = $mod, up, fullscreen, 1

# Move/resize windows with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy

# Volume (PipeWire / WirePlumber)
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
