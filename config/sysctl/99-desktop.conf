# Desktop memory management tuning (32 GB RAM + zram)
# Prevents swap thrashing by using zram (compressed RAM) as primary swap
# and tuning the kernel to behave well with zram.

# With zram, higher swappiness is beneficial -- swapping to compressed RAM
# is cheap. Kernel 5.8+ supports values up to 200 when zram is present.
vm.swappiness = 180

# Keep filesystem metadata caches longer (improves app launches, file browsing)
vm.vfs_cache_pressure = 50

# Disable watermark boosting (prevents premature reclaim with zram)
vm.watermark_boost_factor = 0

# Wider gap between watermarks so kswapd reclaims in background before
# direct reclaim stalls applications (~400 MB on 32 GB)
vm.watermark_scale_factor = 125

# Single-page swap readahead (optimal for zram's zero seek time)
vm.page-cluster = 0
